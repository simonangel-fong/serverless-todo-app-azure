name: Destroy

on:
  workflow_dispatch: {}

permissions:
  id-token: write # Azure OIDC — same principal authenticates the provider and the backend
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_IN_AUTOMATION: "true"

jobs:
  terraform-destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      # The azurerm backend (unlike the provider) doesn't auto-discover GitHub's OIDC
      # token request vars — bridge them into the job env or `terraform init` hangs
      # indefinitely trying to authenticate instead of failing fast.
      - name: Bridge GitHub OIDC token for the azurerm backend
        run: |
          echo "ARM_OIDC_REQUEST_TOKEN=$ACTIONS_ID_TOKEN_REQUEST_TOKEN" >> "$GITHUB_ENV"
          echo "ARM_OIDC_REQUEST_URL=$ACTIONS_ID_TOKEN_REQUEST_URL" >> "$GITHUB_ENV"

      - name: Materialize backend/tfvars (never committed)
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ vars.TF_STATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TF_STATE_CONTAINER }}"
          key                  = "serverless-todoapp-dev/terraform.tfstate"
          EOF
          cat > def.tfvars <<EOF
          project_name = "${{ vars.TF_PROJECT_NAME }}"
          environment  = "${{ vars.TF_ENVIRONMENT }}"
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform destroy
        run: terraform destroy -input=false -auto-approve -var-file=def.tfvars
